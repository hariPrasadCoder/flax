<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>50 AI Founders | Flax Book</title>
    <meta name="description" content="50 AI Founders — a book by Flax featuring stories, lessons, and insights from 50 AI startup founders building the next generation of products." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://joinflax.com/book" />

    <!-- Open Graph -->
    <meta property="og:type" content="book" />
    <meta property="og:url" content="https://joinflax.com/book" />
    <meta property="og:title" content="50 AI Founders | Flax Book" />
    <meta property="og:description" content="Stories, lessons, and insights from 50 AI startup founders building the next generation of products." />
    <meta property="og:image" content="https://joinflax.com/og-image.png" />
    <meta property="og:site_name" content="Flax" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="50 AI Founders | Flax Book" />
    <meta name="twitter:description" content="Stories, lessons, and insights from 50 AI startup founders building the next generation of products." />
    <meta name="twitter:image" content="https://joinflax.com/og-image.png" />

    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&family=Merriweather:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['Merriweather', 'Georgia', 'serif'],
              sans:  ['Inter', 'system-ui', 'sans-serif'],
              mono:  ['IBM Plex Mono', 'monospace'],
            },
            colors: {
              paper:       'hsl(42, 24%, 95%)',
              ink:         'hsl(0, 0%, 10%)',
              'ink-muted': 'hsl(0, 0%, 42%)',
              rule:        'hsl(0, 0%, 82%)',
              surface:     '#ffffff',
              flax:        '#5A53E1',
              'flax-dark': '#4840c8',
            },
            animation: {
              'fade-in':    'fade-in 0.6s ease-out forwards',
              'fade-in-up': 'fade-in-up 0.7s ease-out forwards',
            },
            keyframes: {
              'fade-in': {
                '0%':   { opacity: '0' },
                '100%': { opacity: '1' },
              },
              'fade-in-up': {
                '0%':   { opacity: '0', transform: 'translateY(16px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
            },
          }
        }
      }
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { scroll-behavior: smooth; overflow-x: hidden; }
      body {
        background-color: hsl(42, 24%, 95%);
        color: hsl(0, 0%, 10%);
        font-family: 'Inter', system-ui, sans-serif;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .delay-100 { animation-delay: 100ms; }
      .delay-200 { animation-delay: 200ms; }
      .delay-300 { animation-delay: 300ms; }
      .delay-400 { animation-delay: 400ms; }
      .delay-500 { animation-delay: 500ms; }
      .opacity-0-start { opacity: 0; }

      .label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.65rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: hsl(0, 0%, 42%);
      }

      .rule-light { border-top: 1px solid hsl(0, 0%, 82%); }

      .card {
        background: #ffffff;
        border: 1px solid hsl(0, 0%, 82%);
        border-radius: 6px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        font-size: 0.875rem;
        border-radius: 5px;
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.15s ease;
        text-decoration: none;
      }
      .btn-primary {
        background: #5A53E1;
        color: #fff;
        border: 1px solid #5A53E1;
        padding: 0.65rem 1.5rem;
        box-shadow: 0 1px 4px rgba(90,83,225,0.25);
      }
      .btn-primary:hover {
        background: #4840c8;
        border-color: #4840c8;
        box-shadow: 0 3px 10px rgba(90,83,225,0.3);
        transform: translateY(-1px);
      }
      .btn-primary:active { transform: translateY(0); box-shadow: none; }
      .btn-ghost {
        background: transparent;
        color: hsl(0,0%,40%);
        border: 1px solid hsl(0,0%,80%);
        padding: 0.65rem 1.5rem;
      }
      .btn-ghost:hover {
        border-color: hsl(0,0%,30%);
        color: hsl(0,0%,10%);
      }

      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: hsl(42,20%,92%); }
      ::-webkit-scrollbar-thumb { background: hsl(0,0%,72%); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/book-entry.tsx"></script>
  </body>
</html>
