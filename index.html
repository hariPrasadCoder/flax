<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flax — Documentation that keeps up with your team</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Merriweather:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['Merriweather', 'Georgia', 'serif'],
              mono: ['IBM Plex Mono', 'monospace'],
              sans: ['IBM Plex Mono', 'monospace'],
            },
            colors: {
              paper: 'hsl(42, 24%, 95%)',
              ink: 'hsl(0, 0%, 10%)',
              'ink-muted': 'hsl(0, 0%, 40%)',
              rule: 'hsl(0, 0%, 80%)',
              surface: '#ffffff',
            },
            boxShadow: {
              'editorial': '2px 2px 0 rgba(0,0,0,0.15)',
              'editorial-md': '3px 3px 0 rgba(0,0,0,0.15)',
              'editorial-lg': '4px 4px 0 rgba(0,0,0,0.12)',
            },
            animation: {
              'fade-in': 'fade-in 0.7s ease-out forwards',
              'fade-in-up': 'fade-in-up 0.7s ease-out forwards',
              'blink': 'blink 1s step-end infinite',
              'diff-appear': 'diff-appear 0.5s ease-out forwards',
            },
            keyframes: {
              'fade-in': {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              'fade-in-up': {
                '0%': { opacity: '0', transform: 'translateY(12px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'blink': {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0' },
              },
              'diff-appear': {
                '0%': { opacity: '0', transform: 'translateX(-4px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
            }
          }
        }
      }
    </script>
    <style>
      * { box-sizing: border-box; }

      body {
        background-color: hsl(42, 24%, 95%);
        color: hsl(0, 0%, 10%);
        font-family: 'IBM Plex Mono', monospace;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      html {
        scroll-behavior: smooth;
        overflow-x: hidden;
      }

      .delay-100 { animation-delay: 100ms; }
      .delay-200 { animation-delay: 200ms; }
      .delay-300 { animation-delay: 300ms; }
      .delay-400 { animation-delay: 400ms; }
      .delay-500 { animation-delay: 500ms; }
      .delay-600 { animation-delay: 600ms; }
      .delay-700 { animation-delay: 700ms; }

      .animate-on-load {
        opacity: 0;
      }

      /* Diff line colors */
      .diff-add {
        background-color: rgba(0, 100, 0, 0.06);
        color: hsl(120, 40%, 25%);
      }
      .diff-remove {
        background-color: rgba(180, 0, 0, 0.06);
        color: hsl(0, 40%, 35%);
        text-decoration: line-through;
      }
      .diff-neutral {
        color: hsl(0, 0%, 40%);
      }

      /* Editorial rule */
      .rule-thick {
        border-top: 2px solid hsl(0, 0%, 10%);
      }
      .rule-thin {
        border-top: 1px solid hsl(0, 0%, 80%);
      }

      /* Section label */
      .section-label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.65rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: hsl(0, 0%, 40%);
      }

      /* Card */
      .card {
        background: #ffffff;
        border: 1px solid hsl(0, 0%, 80%);
        box-shadow: 2px 2px 0 rgba(0,0,0,0.12);
        border-radius: 3px;
      }

      /* Button base */
      .btn-primary {
        background: hsl(0, 0%, 10%);
        color: #fff;
        border: 1px solid hsl(0, 0%, 10%);
        box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        border-radius: 3px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.8rem;
        font-weight: 500;
        padding: 0.625rem 1.25rem;
        letter-spacing: 0.02em;
        transition: box-shadow 0.15s, transform 0.15s;
        display: inline-flex;
        align-items: center;
        cursor: pointer;
        white-space: nowrap;
      }
      .btn-primary:hover {
        box-shadow: 3px 3px 0 rgba(0,0,0,0.25);
        transform: translate(-0.5px, -0.5px);
      }
      .btn-primary:active {
        box-shadow: 1px 1px 0 rgba(0,0,0,0.2);
        transform: translate(1px, 1px);
      }

      .btn-outline {
        background: transparent;
        color: hsl(0, 0%, 10%);
        border: 1px solid hsl(0, 0%, 40%);
        box-shadow: 2px 2px 0 rgba(0,0,0,0.08);
        border-radius: 3px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.8rem;
        font-weight: 500;
        padding: 0.625rem 1.25rem;
        letter-spacing: 0.02em;
        transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s;
        display: inline-flex;
        align-items: center;
        cursor: pointer;
        white-space: nowrap;
      }
      .btn-outline:hover {
        border-color: hsl(0, 0%, 10%);
        box-shadow: 2px 2px 0 rgba(0,0,0,0.15);
        transform: translate(-0.5px, -0.5px);
      }

      /* Small accept/reject buttons in mockup */
      .btn-accept {
        background: hsl(120, 30%, 40%);
        color: white;
        border: 1px solid hsl(120, 30%, 30%);
        border-radius: 2px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.65rem;
        padding: 0.2rem 0.6rem;
        cursor: pointer;
        box-shadow: 1px 1px 0 rgba(0,0,0,0.2);
      }
      .btn-reject {
        background: transparent;
        color: hsl(0, 0%, 40%);
        border: 1px solid hsl(0, 0%, 75%);
        border-radius: 2px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.65rem;
        padding: 0.2rem 0.6rem;
        cursor: pointer;
      }

      /* Horizontal scrollbar hide */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: hsl(42, 24%, 90%); }
      ::-webkit-scrollbar-thumb { background: hsl(0, 0%, 70%); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
