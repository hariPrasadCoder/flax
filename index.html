<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flax | Meeting Action Taker</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <script async src="https://tally.so/widgets/embed.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&family=Merriweather:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['Merriweather', 'Georgia', 'serif'],
              sans: ['Inter', 'system-ui', 'sans-serif'],
              mono: ['IBM Plex Mono', 'monospace'],
            },
            colors: {
              paper:      'hsl(42, 24%, 95%)',
              ink:        'hsl(0, 0%, 10%)',
              'ink-muted':'hsl(0, 0%, 42%)',
              rule:       'hsl(0, 0%, 82%)',
              surface:    '#ffffff',
              flax:       '#5A53E1',
              'flax-dark':'#4840c8',
            },
            fontSize: {
              'display': ['clamp(3rem, 7vw, 6rem)', { lineHeight: '1.08', letterSpacing: '-0.02em' }],
              'display-sm': ['clamp(2rem, 4vw, 3.25rem)', { lineHeight: '1.12', letterSpacing: '-0.015em' }],
            },
            animation: {
              'fade-in':      'fade-in 0.6s ease-out forwards',
              'fade-in-up':   'fade-in-up 0.7s ease-out forwards',
              'slide-up':     'slide-up 0.5s ease-out forwards',
              'float':        'float 5s ease-in-out infinite',
              'glow-pulse':   'glow-pulse 3s ease-in-out infinite',
              'hero-bg':      'hero-bg 8s ease-in-out infinite',
              'line-grow':    'line-grow 0.8s cubic-bezier(0.4,0,0.2,1) forwards',
              'count-in':     'count-in 0.4s ease-out forwards',
            },
            keyframes: {
              'fade-in': {
                '0%':   { opacity: '0' },
                '100%': { opacity: '1' },
              },
              'fade-in-up': {
                '0%':   { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'slide-up': {
                '0%':   { opacity: '0', transform: 'translateY(24px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'float': {
                '0%,100%': { transform: 'translateY(0px)' },
                '50%':     { transform: 'translateY(-10px)' },
              },
              'glow-pulse': {
                '0%,100%': { boxShadow: '0 0 24px rgba(90,83,225,0.35), 0 0 48px rgba(90,83,225,0.1)' },
                '50%':     { boxShadow: '0 0 40px rgba(90,83,225,0.6), 0 0 80px rgba(90,83,225,0.2)' },
              },
              'hero-bg': {
                '0%,100%': { opacity: '0.25', transform: 'scale(1) translate(0,0)' },
                '33%':     { opacity: '0.35', transform: 'scale(1.08) translate(2%,-2%)' },
                '66%':     { opacity: '0.28', transform: 'scale(0.96) translate(-2%,2%)' },
              },
              'line-grow': {
                '0%':   { transform: 'scaleX(0)', opacity: '0' },
                '100%': { transform: 'scaleX(1)', opacity: '1' },
              },
              'count-in': {
                '0%':   { opacity: '0', transform: 'translateY(12px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
            },
          }
        }
      }
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html { scroll-behavior: smooth; overflow-x: hidden; }

      body {
        background-color: hsl(42, 24%, 95%);
        color: hsl(0, 0%, 10%);
        font-family: 'Inter', system-ui, sans-serif;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ─── Delays ─────────────────────────────────────── */
      .delay-100 { animation-delay: 100ms; }
      .delay-200 { animation-delay: 200ms; }
      .delay-300 { animation-delay: 300ms; }
      .delay-400 { animation-delay: 400ms; }
      .delay-500 { animation-delay: 500ms; }
      .delay-600 { animation-delay: 600ms; }
      .opacity-0-start { opacity: 0; }

      /* ─── Typography ─────────────────────────────────── */
      .label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.65rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: hsl(0, 0%, 42%);
      }

      /* ─── Editorial rules ────────────────────────────── */
      .rule-heavy { border-top: 2px solid hsl(0, 0%, 10%); }
      .rule-light  { border-top: 1px solid hsl(0, 0%, 82%); }

      /* ─── Cards ──────────────────────────────────────── */
      .card {
        background: #ffffff;
        border: 1px solid hsl(0, 0%, 82%);
        border-radius: 6px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      }

      /* ─── Diff colours ───────────────────────────────── */
      .diff-add    { background: rgba(34,197,94,0.07); color: hsl(142,50%,28%); }
      .diff-remove { background: rgba(239,68,68,0.06); color: hsl(0,45%,40%); text-decoration: line-through; }
      .diff-ctx    { color: hsl(0,0%,50%); }

      /* ─── Buttons ────────────────────────────────────── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        font-size: 0.875rem;
        border-radius: 5px;
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.15s ease;
        text-decoration: none;
      }
      .btn-primary {
        background: #5A53E1;
        color: #fff;
        border: 1px solid #5A53E1;
        padding: 0.65rem 1.5rem;
        box-shadow: 0 1px 4px rgba(90,83,225,0.25);
      }
      .btn-primary:hover {
        background: #4840c8;
        border-color: #4840c8;
        box-shadow: 0 3px 10px rgba(90,83,225,0.3);
        transform: translateY(-1px);
      }
      .btn-primary:active { transform: translateY(0); box-shadow: none; }

      .btn-secondary {
        background: transparent;
        color: #5A53E1;
        border: 1px solid #5A53E1;
        padding: 0.65rem 1.5rem;
      }
      .btn-secondary:hover {
        background: rgba(90,83,225,0.07);
        box-shadow: 0 2px 8px rgba(90,83,225,0.15);
        transform: translateY(-1px);
      }
      .btn-secondary:active { transform: translateY(0); box-shadow: none; }

      .btn-ghost {
        background: transparent;
        color: hsl(0,0%,40%);
        border: 1px solid hsl(0,0%,80%);
        padding: 0.65rem 1.5rem;
      }
      .btn-ghost:hover {
        border-color: hsl(0,0%,30%);
        color: hsl(0,0%,10%);
      }

      .btn-sm {
        font-size: 0.75rem;
        padding: 0.4rem 0.9rem;
        border-radius: 4px;
      }

      /* ─── Mockup buttons ─────────────────────────────── */
      .btn-confirm {
        background: hsl(142,45%,38%);
        color: #fff;
        border: none;
        border-radius: 3px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.62rem;
        padding: 0.22rem 0.65rem;
        cursor: pointer;
      }
      .btn-skip {
        background: transparent;
        color: hsl(0,0%,50%);
        border: 1px solid hsl(0,0%,78%);
        border-radius: 3px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.62rem;
        padding: 0.22rem 0.65rem;
        cursor: pointer;
      }

      /* ─── Dot grid texture (for dark sections) ────────── */
      .dot-grid {
        background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1px, transparent 1px);
        background-size: 28px 28px;
      }

      /* ─── Ambient glow blob animation ──────────────────── */
      @keyframes glow-drift {
        0%,100% { opacity: 0.65; transform: scale(1) translate(0,0); }
        33%      { opacity: 0.85; transform: scale(1.06) translate(3%,-3%); }
        66%      { opacity: 0.72; transform: scale(0.97) translate(-2%,2%); }
      }
      .glow-drift { animation: glow-drift 12s ease-in-out infinite; }

      /* ─── Scrollbar ──────────────────────────────────── */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: hsl(42,20%,92%); }
      ::-webkit-scrollbar-thumb { background: hsl(0,0%,72%); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
